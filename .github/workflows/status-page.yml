name: Status Page

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    paths:
      - "status/**"
      - ".github/workflows/status-page.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate latest status snapshot
        run: node status/scripts/check-status.mjs
        env:
          PUBLIC_STATUS_URL: https://raastey.github.io/ftgn-status/data/status.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: status

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
