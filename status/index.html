<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>FrameTheGlobe — Status</title>
    <meta name="description" content="Live operational status for FrameTheGlobe site, auth, paywall, billing, APIs, and background systems." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144@400;0,9..144,600;0,9..144,700;1,9..144,400&family=Instrument+Sans:wght@400;500;600;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./assets/status.css" />
  </head>
  <body>

    <header class="brand-row">
      <div class="brand-wrap">
        <span class="brand">FrameTheGlobe<span class="brand-news">News</span> <span class="beta-badge">Beta</span></span>
        <div class="brand-meta">
          <span>Site</span>
          <span>•</span>
          <span>Auth</span>
          <span>•</span>
          <span>Paywall</span>
          <span>•</span>
          <span>APIs</span>
          <span class="meta-live">Live</span>
        </div>
      </div>
    </header>

    <div class="status-banner" id="statusBanner">
      <h1 class="banner-text" id="overallLabel">Checking system…</h1>
      <div class="banner-subtext" id="breakingStatus">Loading live system updates...</div>
    </div>
      
    <div class="main-content">
        <div class="page-title-row">
          <h1 class="page-title">Current Status</h1>
          <div class="page-meta">
            <span>Uptime over last 60 snapshots.</span>
            <a href="#" class="section-link">View historical uptime</a>
          </div>
        </div>
        
        <div class="rule" role="separator"></div>

        <section class="section">
          <div id="checksGrid" class="checks-grid"></div>
        </section>

      <section class="section">
        <div class="section-head">
          <h2 class="section-title">Maintenance &amp; Incidents</h2>
          <span class="section-sub">Historical log</span>
        </div>
        <ul id="eventsList" class="events-list" role="list"></ul>
      </section>

      <footer class="foot">
        <span class="foot-text">FrameTheGlobe Status</span>
        <a class="foot-link" href="https://www.frametheglobe.xyz" target="_blank" rel="noreferrer">← frametheglobe.xyz</a>
      </footer>
    </div>

    <script src="./assets/status.js" defer></script>
  </body>
</html>
