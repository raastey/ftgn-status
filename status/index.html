<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FrameTheGlobe Status</title>
    <meta
      name="description"
      content="Live operational status for FrameTheGlobe services, APIs, and background systems."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/status.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <main class="shell">
      <header class="hero">
        <p class="kicker">SYSTEM STATUS</p>
        <h1>FrameTheGlobe Command Status</h1>
        <p class="subtitle">
          Full-spectrum public tracker for web, APIs, data pipelines, and AI platform availability.
        </p>
        <div class="hero-meta">
          <span id="overallBadge" class="badge badge-muted">Checking...</span>
          <span id="lastUpdated" class="meta">Last updated: --</span>
        </div>
      </header>

      <section class="panel">
        <h2>Operational Summary</h2>
        <div id="summaryCards" class="summary-cards"></div>
        <h3 class="subhead">Fleet Health Bars</h3>
        <div id="fleetBars" class="fleet-bars"></div>
      </section>

      <section class="panel">
        <h2>Tracked Components</h2>
        <div id="checksTable" class="checks-table"></div>
      </section>

      <section class="panel">
        <h2>Incident Timeline</h2>
        <div id="uptimeBars" class="uptime-bars"></div>
        <ul id="eventsList" class="events-list"></ul>
      </section>

      <footer class="foot">
        <span>FrameTheGlobe Status</span>
        <a href="https://www.frametheglobe.xyz" target="_blank" rel="noreferrer">Back to frametheglobe.xyz</a>
      </footer>
    </main>

    <script src="./assets/status.js" defer></script>
  </body>
</html>
